<title>AI Emoji Picker - 智能表情选择器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;--accent:#e94560;--accent2:#533483;--text:#eee;--text2:#aaa;--radius:12px;--shadow:0 4px 20px rgba(0,0,0,.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.container{max-width:900px;width:100%;padding:16px}
header{text-align:center;padding:24px 0 16px}
header h1{font-size:2em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
header p{color:var(--text2);font-size:.9em}
.search-box{position:relative;margin:16px 0}
.search-box input{width:100%;padding:14px 20px 14px 48px;border:2px solid var(--surface2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:1em;outline:none;transition:border .3s}
.search-box input:focus{border-color:var(--accent)}
.search-box .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.2em}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 0;margin-bottom:12px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:20px;background:var(--surface);border:none;color:var(--text2);cursor:pointer;font-size:.85em;white-space:nowrap;transition:all .3s}
.tab:hover,.tab.active{background:var(--accent);color:#fff}
.section-title{font-size:.85em;color:var(--text2);margin:16px 0 8px;padding-left:4px}
.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:4px;margin-bottom:16px}
.emoji-item{font-size:1.8em;padding:8px;text-align:center;border-radius:var(--radius);cursor:pointer;transition:all .2s;position:relative;user-select:none}
.emoji-item:hover{background:var(--surface2);transform:scale(1.2)}
.emoji-item:active{transform:scale(.95)}
.emoji-item .fav-btn{position:absolute;top:0;right:0;font-size:.4em;opacity:0;transition:opacity .2s;background:none;border:none;cursor:pointer;padding:2px}
.emoji-item:hover .fav-btn{opacity:1}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:var(--radius);font-size:.95em;opacity:0;transition:all .4s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.recommend-panel{background:var(--surface);border-radius:var(--radius);padding:12px 16px;margin:12px 0;display:none}
.recommend-panel.show{display:block}
.recommend-panel h3{font-size:.85em;color:var(--text2);margin-bottom:8px}
.recommend-panel .emoji-grid{grid-template-columns:repeat(auto-fill,minmax(42px,1fr))}
footer{text-align:center;padding:20px;color:var(--text2);font-size:.8em;margin-top:auto}
@media(max-width:600px){
  header h1{font-size:1.5em}
  .emoji-grid{grid-template-columns:repeat(auto-fill,minmax(40px,1fr))}
  .emoji-item{font-size:1.5em;padding:6px}
  .container{padding:10px}
}
</style>
</head>

// State
let favorites = JSON.parse(localStorage.getItem('emoji-favorites') || '[]');
let recent = JSON.parse(localStorage.getItem('emoji-recent') || '[]');
let currentTab = 'all';

// DOM
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('emojiContent');
const searchInput = document.getElementById('searchInput');
const toastEl = document.getElementById('toast');
const recommendPanel = document.getElementById('recommendPanel');
const recommendGrid = document.getElementById('recommendGrid');

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 1500);
}

function copyEmoji(emoji) {
  navigator.clipboard.writeText(emoji).then(() => {
    showToast('✅ 已复制 ' + emoji);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = emoji;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ 已复制 ' + emoji);
  });
  addRecent(emoji);
  showRecommendations(emoji);
}

function addRecent(emoji) {
  recent = recent.filter(e => e !== emoji);
  recent.unshift(emoji);
  if (recent.length > 50) recent = recent.slice(0, 50);
  localStorage.setItem('emoji-recent', JSON.stringify(recent));
}

function toggleFavorite(emoji, e) {
  e.stopPropagation();
  const idx = favorites.indexOf(emoji);
  if (idx > -1) {
    favorites.splice(idx, 1);
    showToast('💔 取消收藏 ' + emoji);
  } else {
    favorites.push(emoji);
    showToast('⭐ 已收藏 ' + emoji);
  }
  localStorage.setItem('emoji-favorites', JSON.stringify(favorites));
  render();
}

function showRecommendations(emoji) {
  const rec = recommendations[emoji];
  if (!rec) { recommendPanel.classList.remove('show'); return; }
  const emojis = [...rec];
  recommendGrid.innerHTML = '';
  emojis.forEach(e => {
    if (typeof e === 'string' && e.trim()) {
      const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
      const segments = [...segmenter.segment(e)].map(s => s.segment);
      // Actually rec is a string, split into individual emojis
    }
  });
  // Split recommendation string into individual emojis
  const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
  const recEmojis = [...segmenter.segment(rec)].map(s => s.segment).filter(s => s.trim());
  recommendGrid.innerHTML = '';
  recEmojis.forEach(e => {
    const div = document.createElement('div');
    div.className = 'emoji-item';
    div.textContent = e;
    div.onclick = () => copyEmoji(e);
    recommendGrid.appendChild(div);
  });
  recommendPanel.classList.add('show');
}
function splitEmojis(str) {
  try {
    const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
    return [...segmenter.segment(str)].map(s => s.segment).filter(s => s.trim());
  } catch(e) {
    return [...str].filter(s => s.trim());
  }
}

function createEmojiEl(emoji) {
  const div = document.createElement('div');
  div.className = 'emoji-item';
  div.textContent = emoji;
  div.onclick = () => copyEmoji(emoji);
  const favBtn = document.createElement('button');
  favBtn.className = 'fav-btn';
  favBtn.textContent = favorites.includes(emoji) ? '⭐' : '☆';
  favBtn.onclick = (e) => toggleFavorite(emoji, e);
  div.appendChild(favBtn);
  return div;
}

function render() {
  contentEl.innerHTML = '';
  const query = searchInput.value.trim().toLowerCase();

  if (query) {
    renderSearch(query);
    return;
  }

  if (currentTab === 'all') {
    // Show recent and favorites first
    if (recent.length > 0) {
      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = '🕐 最近使用';
      contentEl.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'emoji-grid';
      recent.slice(0, 30).forEach(e => grid.appendChild(createEmojiEl(e)));
      contentEl.appendChild(grid);
    }
    if (favorites.length > 0) {
      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = '⭐ 我的收藏';
      contentEl.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'emoji-grid';
      favorites.forEach(e => grid.appendChild(createEmojiEl(e)));
      contentEl.appendChild(grid);
    }
    // Show all categories
    Object.entries(emojiData).forEach(([cat, data]) => {
      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = cat;
      contentEl.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'emoji-grid';
      splitEmojis(data.emojis).forEach(e => grid.appendChild(createEmojiEl(e)));
      contentEl.appendChild(grid);
    });
  } else if (currentTab === 'recent') {
    if (recent.length === 0) {
      contentEl.innerHTML = '<div class="section-title" style="text-align:center;padding:40px">还没有使用记录，点击任意表情开始吧 😊</div>';
      return;
    }
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = '🕐 最近使用';
    contentEl.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'emoji-grid';
    recent.forEach(e => grid.appendChild(createEmojiEl(e)));
    contentEl.appendChild(grid);
  } else if (currentTab === 'favorites') {
    if (favorites.length === 0) {
      contentEl.innerHTML = '<div class="section-title" style="text-align:center;padding:40px">还没有收藏，悬停表情点击 ☆ 收藏吧 ⭐</div>';
      return;
    }
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = '⭐ 我的收藏';
    contentEl.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'emoji-grid';
    favorites.forEach(e => grid.appendChild(createEmojiEl(e)));
    contentEl.appendChild(grid);
  } else {
    // Specific category
    const data = emojiData[currentTab];
    if (data) {
      const title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = currentTab;
      contentEl.appendChild(title);
      const grid = document.createElement('div');
      grid.className = 'emoji-grid';
      splitEmojis(data.emojis).forEach(e => grid.appendChild(createEmojiEl(e)));
      contentEl.appendChild(grid);
    }
  }
}

function renderSearch(query) {
  const results = new Set();
  Object.entries(emojiData).forEach(([cat, data]) => {
    // Search in keywords
    Object.entries(data.keywords).forEach(([keys, emojis]) => {
      const keyList = keys.toLowerCase().split(',');
      if (keyList.some(k => k.includes(query) || query.includes(k))) {
        splitEmojis(emojis).forEach(e => results.add(e));
      }
    });
    // Also search category name
    if (cat.toLowerCase().includes(query)) {
      splitEmojis(data.emojis).forEach(e => results.add(e));
    }
  });

  if (results.size === 0) {
    contentEl.innerHTML = '<div class="section-title" style="text-align:center;padding:40px">没有找到匹配的表情 😅 试试其他关键词</div>';
    return;
  }

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = '🔍 搜索结果 (' + results.size + ')';
  contentEl.appendChild(title);
  const grid = document.createElement('div');
  grid.className = 'emoji-grid';
  results.forEach(e => grid.appendChild(createEmojiEl(e)));
  contentEl.appendChild(grid);
}

// Init tabs
function initTabs() {
  const allTabs = [
    { id: 'all', label: '📋 全部' },
    { id: 'recent', label: '🕐 最近' },
    { id: 'favorites', label: '⭐ 收藏' },
    ...Object.keys(emojiData).map(k => ({ id: k, label: k.slice(0, 2) + ' ' + k.slice(2) }))
  ];
  tabsEl.innerHTML = '';
  allTabs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (currentTab === t.id ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => {
      currentTab = t.id;
      recommendPanel.classList.remove('show');
      initTabs();
      render();
    };
    tabsEl.appendChild(btn);
  });
}

// Search debounce
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    recommendPanel.classList.remove('show');
    render();
  }, 200);
});

// Init
initTabs();
render();
</script>
