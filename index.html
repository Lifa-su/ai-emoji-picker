.cat-btn:hover,.cat-btn.active{background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.3)}
.section-title{font-size:.95rem;color:#94a3b8;margin:12px 0 8px;padding-left:4px;display:flex;align-items:center;gap:6px}
.recent-section{background:#16213e;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.recent-section .section-title{margin-top:0}
.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:4px}
.emoji-item{display:flex;align-items:center;justify-content:center;font-size:1.8rem;padding:8px;border-radius:12px;cursor:pointer;transition:all .15s;user-select:none;position:relative}
.emoji-item:hover{background:#2d3561;transform:scale(1.25);z-index:1}
.emoji-item:active{transform:scale(1.1)}
.main-grid{background:#16213e;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.cat-header{font-size:.9rem;color:#a855f7;margin:16px 0 8px;padding-left:4px;font-weight:600}
.cat-header:first-child{margin-top:0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;padding:10px 24px;border-radius:24px;font-size:.9rem;opacity:0;transition:all .3s;pointer-events:none;z-index:999;box-shadow:0 4px 20px rgba(99,102,241,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.no-results{text-align:center;padding:40px;color:#64748b;font-size:1rem}
.no-results span{font-size:2.5rem;display:block;margin-bottom:12px}
.clear-btn{background:none;border:none;color:#64748b;font-size:.75rem;cursor:pointer;padding:2px 8px;border-radius:8px;transition:color .2s}
.clear-btn:hover{color:#ef4444}
footer{text-align:center;padding:24px 0;color:#475569;font-size:.8rem}
footer a{color:#6366f1;text-decoration:none}
@media(max-width:600px){
.container{padding:12px}
header h1{font-size:1.4rem}
.emoji-grid{grid-template-columns:repeat(auto-fill,minmax(44px,1fr))}
.emoji-item{font-size:1.5rem;padding:6px}
.cat-btn{padding:6px 12px;font-size:.8rem}
}

const CAT_NAMES=["","表情与情感","手势与人物","动物与自然","食物与饮料","旅行与地点","活动","物品","符号","旗帜"];
let activeCat="all",searchTerm="";

function getRecent(){try{return JSON.parse(localStorage.getItem("emoji_recent")||"[]")}catch(e){return[]}}
function saveRecent(list){localStorage.setItem("emoji_recent",JSON.stringify(list))}
function addRecent(emoji){let r=getRecent().filter(e=>e!==emoji);r.unshift(emoji);if(r.length>32)r=r.slice(0,32);saveRecent(r);renderRecent()}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1500)}

async function copyEmoji(emoji){
  addRecent(emoji);
  try{await navigator.clipboard.writeText(emoji);showToast(emoji+" 已复制 Copied!")}
  catch(e){
    const ta=document.createElement("textarea");ta.value=emoji;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    showToast(emoji+" 已复制 Copied!");
  }
}

function makeEmojiEl(emoji){
  const d=document.createElement("div");
  d.className="emoji-item";
  d.textContent=emoji;
  d.setAttribute("role","button");
  d.setAttribute("aria-label",emoji);
  d.addEventListener("click",()=>copyEmoji(emoji));
  return d;
}

function renderRecent(){
  const wrap=document.getElementById("recent-wrap"),grid=document.getElementById("recentGrid");
  const recent=getRecent();
  if(!recent.length||searchTerm){wrap.style.display="none";return}
  wrap.style.display="block";
  grid.innerHTML="";
  recent.forEach(e=>{grid.appendChild(makeEmojiEl(e))});
}

function renderMain(){
  const grid=document.getElementById("mainGrid");
  grid.innerHTML="";
  const q=searchTerm.toLowerCase();
  let grouped={};
  let filtered=D.filter(item=>{
    if(activeCat!=="all"&&CATS.findIndex(c=>c[0]===activeCat)!==item[1])return false;
    if(!q)return true;
    return item[0].includes(q)||item[2].toLowerCase().includes(q)||item[3].includes(q);
  });
  if(!filtered.length){
    grid.innerHTML='<div class="no-results"><span>🔍</span>没有找到匹配的表情 / No emoji found</div>';
    return;
  }
  if(activeCat==="all"&&!q){
    for(let i=1;i<=9;i++)grouped[i]=[];
    filtered.forEach(item=>{if(grouped[item[1]])grouped[item[1]].push(item)});
    for(let i=1;i<=9;i++){
      if(!grouped[i].length)continue;
      const h=document.createElement("div");
      h.className="cat-header";
      h.textContent=CAT_NAMES[i];
      grid.appendChild(h);
      const g=document.createElement("div");
      g.className="emoji-grid";
      grouped[i].forEach(item=>g.appendChild(makeEmojiEl(item[0])));
      grid.appendChild(g);
    }
  }else{
    const g=document.createElement("div");
    g.className="emoji-grid";
    filtered.forEach(item=>g.appendChild(makeEmojiEl(item[0])));
    grid.appendChild(g);
  }
}

function renderCats(){
  const wrap=document.getElementById("categories");
  wrap.innerHTML="";
  CATS.forEach(cat=>{
    const btn=document.createElement("button");
    btn.className="cat-btn"+(activeCat===cat[0]?" active":"");
    btn.textContent=cat[1];
    btn.addEventListener("click",()=>{activeCat=cat[0];renderCats();renderMain();renderRecent()});
    wrap.appendChild(btn);
  });
}

document.getElementById("search").addEventListener("input",e=>{
  searchTerm=e.target.value.trim();
  renderMain();
  renderRecent();
});

document.getElementById("clearRecent").addEventListener("click",()=>{
  saveRecent([]);renderRecent();
});

renderCats();renderRecent();renderMain();
</script>
<script async src="https://cdn.sitemoney.co/monetize.js"></script>
</body>
</html>
